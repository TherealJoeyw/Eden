services:
  bot:
    image: python:3.11-slim
    command: >
      sh -c "apt-get update -qq &&
             apt-get install -y -qq --no-install-recommends postgresql-client &&
             pip install -q -r /app/requirements.txt &&
             python /app/bot/main.py"
    depends_on:
      - postgres
    env_file:
      - /mnt/pool/Apps/Eden/.env
    restart: unless-stopped
    volumes:
      - /mnt/pool/Apps/Eden:/app
      - /mnt/pool/Apps/Eden/backups:/backups

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: eden
      POSTGRES_PASSWORD: eden
      POSTGRES_USER: eden
    restart: unless-stopped
    volumes:
      - /mnt/pool/Apps/Eden/pgdata:/var/lib/postgresql/data

volumes: {}
